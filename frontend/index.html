<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 400px 1fr;
            gap: 20px;
            align-items: start;
        }


        .panel {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            height: 650px;             
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }


        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        #preview {
            min-height: 400px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #f9f9f9;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 1000px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .panel {
                height: auto;
            }
        }


        .three-column-layout {
            display: flex;
            gap: 20px;
            align-items: stretch;
        }

        .panel {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        #preview {
            flex: 1;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        #preview iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        pre {
            background: #111;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            overflow: auto;
            max-height: 500px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        @media (max-width: 1000px) {
            .three-column-layout {
                flex-direction: column;
            }
        }

        #codeBlock {
            flex: 1;
            overflow: auto;
            background: #0f172a;
            color: #00ff88;
            padding: 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;        /* 🔥 wraps long lines */
            word-break: break-word;       /* 🔥 prevents overflow */
        }


    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>✨ AI Website Generator</h1>
        <p>Create a website in seconds using AI</p>
    </header>

    <div class="three-column-layout">

        <!-- 1️⃣ FORM -->
        <div class="panel">
            <h2>Business Details</h2>

            <form id="generateForm">
                <div class="form-group">
                    <label>Business Name *</label>
                    <input type="text" id="businessName" placeholder="e.g., TechFlow Solutions"  required>
                </div>

                <div class="form-group">
                    <label>Industry *</label>
                    <select id="industry" required>
                        <option value="">Select Industry</option>
                        <option value="Technology">Technology</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Education">Education</option>
                        <option value="Finance">Finance</option>
                        <option value="Retail">Retail</option>
                        <option value="Restaurant">Restaurant</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Target Audience *</label>
                    <input 
                        type="text" 
                        id="targetAudience" 
                        placeholder="e.g., Small businesses, students, families"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Primary Color Theme *</label>
                    <input 
                        type="color" 
                        id="colorTheme" 
                        value="#6366f1"
                        required
                    >
                </div>

                <button type="submit" id="generateBtn">
                    Generate Website
                </button>
            </form>

            <div id="errorMessage"></div>
        </div>


        <!-- 2️⃣ PREVIEW -->
        <div class="panel">
            <h2>Live Preview</h2>
            <div id="preview">
                <p style="color:#777;">Preview will appear here</p>
            </div>
        </div>


        <!-- 3️⃣ GENERATED CODE -->
        <div class="panel">
            <h2>Generated Code</h2>

            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button id="copyBtn">Copy</button>
                <button id="downloadBtn">Download</button>
            </div>

            <pre id="codeBlock"></pre>
        </div>


    </div>
</div>


    <script>
        const form = document.getElementById('generateForm');
        const preview = document.getElementById('preview');
        const errorMessage = document.getElementById('errorMessage');
        const generateBtn = document.getElementById('generateBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            

            const businessName = document.getElementById('businessName').value;
            const industry = document.getElementById('industry').value;
            const targetAudience = document.getElementById('targetAudience').value;
            const colorTheme = document.getElementById('colorTheme').value;

            if (!businessName || !industry || !targetAudience || !colorTheme) {
                alert("Please fill all fields");
                return;
            }


            // Show loading
            preview.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Generating your website...</p>
                    <p style="font-size: 0.9rem; color: #999; margin-top: 10px;">This may take 15-30 seconds</p>
                </div>
            `;
            errorMessage.innerHTML = '';
            generateBtn.disabled = true;
            generateBtn.textContent = 'Generating...';

            try {
                const response = await fetch('http://localhost:3000/api/generate-website', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        businessName,
                        industry,
                        targetAudience,
                        colorTheme
                    })

                });

                const data = await response.json();

                if (data.success === true && data.code) {

                    window.generatedHtml = data.code;

                    let jsxContent = data.code;

                    // Remove function wrapper
                    jsxContent = jsxContent
                        .replace(/function[\s\S]*?return\s*\(/, '')
                        .replace(/\);\s*}?\s*$/, '');

                    // Convert className to class
                    jsxContent = jsxContent.replace(/className=/g, "class=");

                    // Remove React comments
                    jsxContent = jsxContent.replace(/{\/\*[\s\S]*?\*\/}/g, "");

                    // Wrap into full HTML safely
                    const fullHTML =
                        "<!DOCTYPE html>" +
                        "<html>" +
                        "<head>" +
                        "<meta charset='UTF-8'>" +
                        "<script src='https://cdn.tailwindcss.com'><\/script>" +
                        "</head>" +
                        "<body>" +
                        jsxContent +
                        "</body>" +
                        "</html>";

                    preview.innerHTML =
                        "<iframe style='width:100%; height:500px; border:none; border-radius:8px;' " +
                        "srcdoc=\"" + fullHTML.replace(/"/g, "&quot;") + "\"></iframe>";

                    document.getElementById("codeBlock").textContent = data.code;
                }


                else if(data.success === false){
                    errorMessage.innerHTML = `
                    <div class="error">
                        ❌ Error: ${data.message}
                    </div>
                `;
                generateBtn.disabled = false;
                generateBtn.textContent = 'Generate Website';
                
                } else {
                    throw new Error(data.error || 'Failed to generate');
                }
            } catch (error) {
                errorMessage.innerHTML = `
                    <div class="error">
                        ❌ Error: ${error.message}
                        <br><small>Make sure the backend server is running on port 3000</small>
                    </div>
                `;
                preview.innerHTML = '<div style="text-align: center; padding: 50px; color: #999;">Generation failed</div>';
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = 'Generate Website';
            }
        });

        document.addEventListener("click", function(e){

            if(e.target.id === "copyBtn"){
                navigator.clipboard.writeText(window.generatedHtml);
                alert("Code copied!");
            }

            if(e.target.id === "downloadBtn"){
                const blob = new Blob([window.generatedHtml], { type: "text/html" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "website.html";
                link.click();
            }

        });

    </script>
</body>
</html>
